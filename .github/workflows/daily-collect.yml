# GitHub Actions: 매일 가격 수집 + 앱 데이터 가공 (무료 cron)
# 저장 위치: 레포의 .github/workflows/daily-collect.yml
name: daily price collect

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 UTC 00:00 = 한국시간 09:00
  workflow_dispatch:        # 수동 실행 버튼도 제공

permissions:
  contents: write           # prices.csv / app_data.* 커밋용

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect prices
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          COUPANG_ACCESS_KEY:  ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY:  ${{ secrets.COUPANG_SECRET_KEY }}
        run: python collect_prices.py

      - name: Build app data
        run: |
          if [ -f prices.csv ]; then
            python build_app_data.py
          else
            echo "prices.csv 없음 — 가공 단계 건너뜀 (네이버 키 등록 확인)"
          fi

      - name: Commit results
        run: |
          git config user.name  "price-bot"
          git config user.email "bot@users.noreply.github.com"
          for f in prices.csv app_data.js app_data.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "update: $(date +%F)"
            git push
          fi
